name: electric_home
description: Electric Home - การไฟฟ้า App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0 
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  iconly: ^1.0.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  provider: ^6.0.5
  url_launcher: ^6.3.0
  loading_animation_widget:
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  fonts:
  - family: MyFlutterApp
    fonts:
      - asset: assets/fonts/MyFlutterApp.ttf

  - family: Koulen
    fonts:
      - asset: assets/fonts/Koulen.ttf

  - family: NotoSansThai
    fonts:
      - asset: assets/fonts/NotoSansThai.ttf