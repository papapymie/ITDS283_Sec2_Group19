name: electric_home
description: Electric Home - การไฟฟ้า App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0 
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  iconly: ^1.0.1
  loading_animation_widget:

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  fonts:
  - family: MyFlutterApp
    fonts:
      - asset: assets/fonts/MyFlutterApp.ttf

  - family: Koulen
    fonts:
      - asset: assets/fonts/Koulen.ttf

  - family: NotoSansThai
    fonts:
      - asset: assets/fonts/NotoSansThai.ttf